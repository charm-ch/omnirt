name: musetalk
device: npu
profile: ascend

sources:
  repo_url: https://github.com/TMElyralab/MuseTalk.git

paths:
  runtime_dir: ${OMNIRT_HOME}/runtimes/musetalk/npu
  repo_dir: ${OMNIRT_HOME}/model-repos/MuseTalk

runtime:
  type: venv
  python: "3.10"
  env_script: /usr/local/Ascend/ascend-toolkit/set_env.sh
  nproc_per_node: 1

install:
  requirements_file: ${OMNIRT_ROOT}/model_backends/musetalk/requirements-musetalk-ascend.txt
  repo_marker_dir: musetalk
  pip_index_url: https://pypi.tuna.tsinghua.edu.cn/simple
  hf_endpoint: https://hf-mirror.com

launch:
  server_path: ${OMNIRT_ROOT}/model_backends/musetalk/musetalk_ws_server.py

